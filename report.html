<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>A10 접속 확인 보고서</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic',sans-serif;background:#f5f6fa;color:#222;font-size:13px}
.wrap{max-width:1100px;margin:0 auto;padding:24px 16px}
h1{font-size:18px;font-weight:600;margin-bottom:4px}
.sub{color:#888;font-size:12px;margin-bottom:20px}

/* 조회 조건 */
.search-box{background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:16px 20px;margin-bottom:16px}
.search-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.search-label{font-size:12px;color:#555;min-width:40px}
.date-input{border:1px solid #ddd;border-radius:4px;padding:5px 10px;font-size:13px;width:110px}
.quick-btns{display:flex;gap:4px;flex-wrap:wrap}
.qbtn{border:1px solid #ddd;background:#fff;border-radius:4px;padding:4px 10px;font-size:12px;cursor:pointer;color:#444}
.qbtn:hover,.qbtn.on{background:#1976d2;color:#fff;border-color:#1976d2}
.search-btn{background:#1976d2;color:#fff;border:none;border-radius:4px;padding:6px 20px;font-size:13px;cursor:pointer;margin-left:auto}
.search-btn:hover{background:#1565c0}

/* 달력 팝업 */
.cal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.3);z-index:1000;align-items:center;justify-content:center}
.cal-overlay.show{display:flex}
.cal-popup{background:#fff;border-radius:8px;padding:16px;box-shadow:0 4px 20px rgba(0,0,0,0.15);min-width:560px}
.cal-quick{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #eee}
.cal-months{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.cal-month-title{text-align:center;font-weight:600;font-size:14px;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:8px}
.cal-nav{cursor:pointer;color:#1976d2;font-size:16px;padding:0 4px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center}
.cal-grid .dow{font-size:11px;color:#888;padding:4px 0}
.cal-grid .dow:first-child{color:#e53935}
.cal-grid .dow:last-child{color:#1976d2}
.cal-day{padding:5px 2px;border-radius:4px;cursor:pointer;font-size:12px}
.cal-day:hover{background:#e3f2fd}
.cal-day.other{color:#ccc}
.cal-day.sun{color:#e53935}
.cal-day.sat{color:#1976d2}
.cal-day.selected{background:#1976d2;color:#fff!important}
.cal-day.in-range{background:#e3f2fd}
.cal-day.today-mark{font-weight:700;text-decoration:underline}
.cal-footer{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:12px;border-top:1px solid #eee}
.sel-range{font-size:12px;color:#555}
.cal-btns{display:flex;gap:8px}
.cal-cancel{border:1px solid #ddd;background:#fff;border-radius:4px;padding:5px 16px;cursor:pointer;font-size:12px}
.cal-confirm{background:#1976d2;color:#fff;border:none;border-radius:4px;padding:5px 16px;cursor:pointer;font-size:12px}

/* 통계 카드 */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.stat{background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:14px 16px}
.stat-label{font-size:11px;color:#888;margin-bottom:6px}
.stat-num{font-size:22px;font-weight:600}
.stat-num.green{color:#1a7f4b}
.stat-num.red{color:#c0392b}
.stat-num.blue{color:#1976d2}

/* 성공률 탭 */
.tab-box{background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:16px;margin-bottom:16px}
.tab-box h2{font-size:14px;font-weight:600;margin-bottom:12px}
.tabs{display:flex;gap:4px;margin-bottom:12px}
.tab{border:1px solid #ddd;background:#fff;border-radius:4px;padding:4px 14px;font-size:12px;cursor:pointer;color:#444}
.tab.on{background:#1976d2;color:#fff;border-color:#1976d2}
.rate-table{width:100%;border-collapse:collapse;font-size:12px}
.rate-table th{background:#f5f6fa;padding:7px 12px;text-align:left;color:#666;font-weight:500;border-bottom:1px solid #e0e0e0}
.rate-table td{padding:7px 12px;border-bottom:1px solid #f0f0f0}
.rate-table tr.fail-row{background:#fff5f5}
.rate-bar{height:6px;background:#e0e0e0;border-radius:3px;overflow:hidden;width:80px;display:inline-block;vertical-align:middle;margin-left:6px}
.rate-bar-fill{height:100%;background:#1a7f4b;border-radius:3px}

/* 차트 */
.chart-box{background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:16px;margin-bottom:16px}
.chart-box h2{font-size:14px;font-weight:600;margin-bottom:12px}

/* 테이블 */
.table-box{background:#fff;border:1px solid #e0e0e0;border-radius:8px;overflow:hidden;margin-bottom:16px}
.table-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #e0e0e0}
.table-head h2{font-size:14px;font-weight:600}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{background:#f5f6fa;padding:8px 14px;text-align:left;color:#666;font-weight:500;border-bottom:1px solid #e0e0e0}
.tbl td{padding:8px 14px;border-bottom:1px solid #f0f0f0}
.tbl tr.fail-row td{background:#fff5f5}
.badge{font-size:11px;padding:2px 8px;border-radius:4px}
.badge.ok{background:#e6f4ee;color:#1a7f4b}
.badge.fail{background:#fdecea;color:#c0392b}
</style>
</head>
<body>
<div class="wrap">
  <p class="sub">A10 이용가이드 사이트</p>
  <h1>접속 확인 보고서</h1>

  <!-- 조회 조건 -->
  <div class="search-box">
    <div class="search-row">
      <span class="search-label">기간</span>
      <input type="text" class="date-input" id="startDate" readonly placeholder="시작일" onclick="openCal()">
      <span>~</span>
      <input type="text" class="date-input" id="endDate" readonly placeholder="종료일" onclick="openCal()">
      <div class="quick-btns">
        <button class="qbtn" onclick="setQuick('today')">오늘</button>
        <button class="qbtn" onclick="setQuick('yesterday')">전일</button>
        <button class="qbtn" onclick="setQuick('week')">주간</button>
        <button class="qbtn" onclick="setQuick('lastweek')">전주</button>
        <button class="qbtn" onclick="setQuick('month')">당월</button>
        <button class="qbtn" onclick="setQuick('lastmonth')">이전달</button>
      </div>
      <button class="search-btn" onclick="applyFilter()">조회</button>
    </div>
  </div>

  <!-- 달력 팝업 -->
  <div class="cal-overlay" id="calOverlay">
    <div class="cal-popup">
      <div class="cal-quick">
        <button class="qbtn" onclick="setQuickCal('today')">오늘</button>
        <button class="qbtn" onclick="setQuickCal('yesterday')">전일</button>
        <button class="qbtn" onclick="setQuickCal('week')">주간</button>
        <button class="qbtn" onclick="setQuickCal('lastweek')">전주</button>
        <button class="qbtn" onclick="setQuickCal('month')">당월</button>
        <button class="qbtn" onclick="setQuickCal('lastmonth')">이전달</button>
      </div>
      <div class="cal-months">
        <div>
          <div class="cal-month-title">
            <span class="cal-nav" onclick="moveCal(-1)">&#8249;</span>
            <span id="calTitle1"></span>
            <span class="cal-nav" onclick="moveCal(1)">&#8250;</span>
          </div>
          <div class="cal-grid" id="calGrid1"></div>
        </div>
        <div>
          <div class="cal-month-title">
            <span id="calTitle2"></span>
          </div>
          <div class="cal-grid" id="calGrid2"></div>
        </div>
      </div>
      <div class="cal-footer">
        <span class="sel-range" id="selRange">선택기간: -</span>
        <div class="cal-btns">
          <button class="cal-cancel" onclick="closeCal()">취소</button>
          <button class="cal-confirm" onclick="confirmCal()">확인</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 통계 카드 -->
  <div class="stats">
    <div class="stat"><div class="stat-label">전체 기록</div><div class="stat-num blue" id="statTotal">-</div></div>
    <div class="stat"><div class="stat-label">접속 성공</div><div class="stat-num green" id="statSuccess">-</div></div>
    <div class="stat"><div class="stat-label">접속 실패</div><div class="stat-num red" id="statFail">-</div></div>
    <div class="stat"><div class="stat-label">전체 성공률</div><div class="stat-num green" id="statRate">-</div></div>
  </div>

  <!-- 성공률 탭 -->
  <div class="tab-box">
    <h2>성공률 현황</h2>
    <div class="tabs">
      <button class="tab on" onclick="switchTab('day',this)">일별</button>
      <button class="tab" onclick="switchTab('week',this)">주별</button>
      <button class="tab" onclick="switchTab('month',this)">월별</button>
    </div>
    <table class="rate-table">
      <thead><tr><th>기간</th><th>전체</th><th>성공</th><th>실패</th><th>성공률</th></tr></thead>
      <tbody id="rateBody"></tbody>
    </table>
  </div>

  <!-- 차트 -->
  <div class="chart-box">
    <h2>시간대별 접속 현황</h2>
    <canvas id="myChart" height="80"></canvas>
  </div>

  <!-- 상세 테이블 -->
  <div class="table-box">
    <div class="table-head">
      <h2>상세 접속 기록</h2>
      <select id="statusFilter" onchange="renderTable()" style="font-size:12px;padding:4px 8px;border:1px solid #ddd;border-radius:4px">
        <option value="all">전체</option>
        <option value="success">성공만</option>
        <option value="fail">실패만</option>
      </select>
    </div>
    <table class="tbl">
      <thead><tr><th>일시</th><th>상태</th><th>메시지</th></tr></thead>
      <tbody id="detailBody"></tbody>
    </table>
  </div>
</div>

<script>
let allData = [];
let filtered = [];
let calStart = null, calEnd = null, calHover = null;
let calBaseYear, calBaseMonth;
let chartInst = null;
let currentTab = 'day';

// 날짜 유틸
function fmt(d){ return d.toISOString().slice(0,10); }
function today(){ return new Date(); }
function parseDate(s){ return s ? new Date(s) : null; }
function diffDays(a,b){ return Math.round((b-a)/(1000*60*60*24))+1; }

// 빠른 기간 설정
function setQuick(type){
  const t = today();
  let s,e;
  if(type==='today'){s=e=fmt(t);}
  else if(type==='yesterday'){const y=new Date(t);y.setDate(y.getDate()-1);s=e=fmt(y);}
  else if(type==='week'){const mon=new Date(t);mon.setDate(t.getDate()-t.getDay()+1);s=fmt(mon);e=fmt(t);}
  else if(type==='lastweek'){const lm=new Date(t);lm.setDate(t.getDate()-t.getDay());const ls=new Date(lm);ls.setDate(lm.getDate()-6);s=fmt(ls);e=fmt(lm);}
  else if(type==='month'){s=fmt(new Date(t.getFullYear(),t.getMonth(),1));e=fmt(t);}
  else if(type==='lastmonth'){const lms=new Date(t.getFullYear(),t.getMonth()-1,1);const lme=new Date(t.getFullYear(),t.getMonth(),0);s=fmt(lms);e=fmt(lme);}
  document.getElementById('startDate').value=s;
  document.getElementById('endDate').value=e;
  calStart=new Date(s); calEnd=new Date(e);
  applyFilter();
}

// 달력 팝업
function openCal(){
  const t=today();
  calBaseYear=t.getFullYear(); calBaseMonth=t.getMonth()-1;
  renderCal(); document.getElementById('calOverlay').classList.add('show');
}
function closeCal(){ document.getElementById('calOverlay').classList.remove('show'); }
function confirmCal(){
  if(calStart&&calEnd){
    document.getElementById('startDate').value=fmt(calStart);
    document.getElementById('endDate').value=fmt(calEnd);
  }
  closeCal();
}
function moveCal(d){ calBaseMonth+=d; if(calBaseMonth<0){calBaseMonth=11;calBaseYear--;}else if(calBaseMonth>11){calBaseMonth=0;calBaseYear++;} renderCal(); }

function setQuickCal(type){
  setQuick(type);
  const s=document.getElementById('startDate').value;
  const e=document.getElementById('endDate').value;
  calStart=new Date(s); calEnd=new Date(e);
  closeCal(); applyFilter();
}

function renderCal(){
  renderMonth('calGrid1','calTitle1',calBaseYear,calBaseMonth);
  let ny=calBaseYear,nm=calBaseMonth+1;
  if(nm>11){nm=0;ny++;}
  renderMonth('calGrid2','calTitle2',ny,nm);
  updateSelRange();
}

function renderMonth(gridId,titleId,year,month){
  const months=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById(titleId).textContent=year+'.'+String(month+1).padStart(2,'0');
  const grid=document.getElementById(gridId);
  grid.innerHTML='';
  ['일','월','화','수','목','금','토'].forEach((d,i)=>{
    const el=document.createElement('div');
    el.className='dow'+(i===0?' sun':i===6?' sat':'');
    el.textContent=d; grid.appendChild(el);
  });
  const first=new Date(year,month,1).getDay();
  const last=new Date(year,month+1,0).getDate();
  const prevLast=new Date(year,month,0).getDate();
  const todayStr=fmt(today());
  for(let i=0;i<first;i++){
    const el=document.createElement('div');
    el.className='cal-day other';
    el.textContent=prevLast-first+1+i; grid.appendChild(el);
  }
  for(let d=1;d<=last;d++){
    const el=document.createElement('div');
    const date=new Date(year,month,d);
    const ds=fmt(date);
    let cls='cal-day';
    const dow=date.getDay();
    if(dow===0) cls+=' sun';
    if(dow===6) cls+=' sat';
    if(ds===todayStr) cls+=' today-mark';
    if(calStart&&calEnd){
      if(ds===fmt(calStart)||ds===fmt(calEnd)) cls+=' selected';
      else if(date>calStart&&date<calEnd) cls+=' in-range';
    } else if(calStart&&ds===fmt(calStart)) cls+=' selected';
    el.className=cls; el.textContent=d;
    el.onclick=()=>selectDay(date);
    grid.appendChild(el);
  }
}

function selectDay(date){
  if(!calStart||calEnd){ calStart=date; calEnd=null; }
  else{ if(date<calStart){ calEnd=calStart; calStart=date; } else { calEnd=date; } }
  renderCal();
}

function updateSelRange(){
  const el=document.getElementById('selRange');
  if(calStart&&calEnd){ el.textContent='선택기간: '+diffDays(calStart,calEnd)+'일'; }
  else if(calStart){ el.textContent='선택기간: 시작일 선택됨'; }
  else { el.textContent='선택기간: -'; }
}

// 데이터 로드
async function load(){
  try{
    const res=await fetch('results.json?t='+Date.now());
    allData=await res.json();
    allData.sort((a,b)=>b.timestamp.localeCompare(a.timestamp));
    setQuick('month');
  } catch(e){
    document.getElementById('detailBody').innerHTML='<tr><td colspan="3" style="text-align:center;padding:20px;color:#999;">데이터를 불러올 수 없습니다.</td></tr>';
  }
}

function applyFilter(){
  const s=document.getElementById('startDate').value;
  const e=document.getElementById('endDate').value;
  if(!s||!e){ filtered=[...allData]; }
  else {
    filtered=allData.filter(d=>{
      const dt=d.timestamp.slice(0,10);
      return dt>=s && dt<=e;
    });
  }
  renderAll();
}

function renderAll(){
  renderStats();
  renderRateTable(currentTab);
  renderChart();
  renderTable();
}

function renderStats(){
  const total=filtered.length;
  const succ=filtered.filter(d=>d.status==='success').length;
  const fail=total-succ;
  const rate=total>0?Math.round(succ/total*100):0;
  document.getElementById('statTotal').textContent=total;
  document.getElementById('statSuccess').textContent=succ;
  document.getElementById('statFail').textContent=fail;
  document.getElementById('statRate').textContent=rate+'%';
  document.getElementById('statRate').className='stat-num '+(rate>=90?'green':rate>=70?'blue':'red');
}

function switchTab(type,el){
  currentTab=type;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  renderRateTable(type);
}

function renderRateTable(type){
  const groups={};
  filtered.forEach(d=>{
    let key;
    const dt=new Date(d.timestamp);
    if(type==='day') key=d.timestamp.slice(0,10);
    else if(type==='week'){
      const mon=new Date(dt); mon.setDate(dt.getDate()-dt.getDay()+1);
      key=fmt(mon)+' 주';
    } else key=d.timestamp.slice(0,7);
    if(!groups[key]) groups[key]={total:0,succ:0};
    groups[key].total++;
    if(d.status==='success') groups[key].succ++;
  });
  const keys=Object.keys(groups).sort().reverse();
  const tbody=document.getElementById('rateBody');
  tbody.innerHTML=keys.map(k=>{
    const g=groups[k];
    const rate=Math.round(g.succ/g.total*100);
    const fail=g.total-g.succ;
    const isFail=fail>0;
    return `<tr class="${isFail?'fail-row':''}">
      <td>${k}</td><td>${g.total}</td><td>${g.succ}</td>
      <td style="color:${fail>0?'#c0392b':'#888'}">${fail}</td>
      <td>
        <span style="color:${rate>=90?'#1a7f4b':rate>=70?'#1976d2':'#c0392b'};font-weight:600">${rate}%</span>
        <span class="rate-bar"><span class="rate-bar-fill" style="width:${rate}%;background:${rate>=90?'#1a7f4b':rate>=70?'#1976d2':'#c0392b'}"></span></span>
      </td>
    </tr>`;
  }).join('');
}

function renderChart(){
  const hours={};
  for(let h=9;h<=18;h++) hours[String(h).padStart(2,'0')]=({succ:0,fail:0});
  filtered.forEach(d=>{
    const h=d.timestamp.slice(11,13);
    if(hours[h]){ if(d.status==='success') hours[h].succ++; else hours[h].fail++; }
  });
  const labels=Object.keys(hours).map(h=>h+':00');
  const succData=Object.values(hours).map(v=>v.succ);
  const failData=Object.values(hours).map(v=>v.fail);
  if(chartInst) chartInst.destroy();
  chartInst=new Chart(document.getElementById('myChart'),{
    type:'bar',
    data:{labels,datasets:[
      {label:'성공',data:succData,backgroundColor:'#1a7f4b'},
      {label:'실패',data:failData,backgroundColor:'#e53935'}
    ]},
    options:{responsive:true,plugins:{legend:{position:'top'}},scales:{x:{stacked:true},y:{stacked:true,ticks:{stepSize:1}}}}
  });
}

function renderTable(){
  const filter=document.getElementById('statusFilter').value;
  const data=filter==='all'?filtered:filtered.filter(d=>filter==='success'?d.status==='success':d.status!=='success');
  document.getElementById('detailBody').innerHTML=data.slice(0,200).map(d=>{
    const ok=d.status==='success';
    return `<tr class="${ok?'':'fail-row'}">
      <td style="color:#666">${d.timestamp}</td>
      <td><span class="badge ${ok?'ok':'fail'}">${ok?'성공':'실패'}</span></td>
      <td>${d.message}</td>
    </tr>`;
  }).join('');
}

load();
</script>
</body>
</html>
